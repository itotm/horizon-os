---
name: Build dev container image
on:
  workflow_dispatch:
    inputs:
      enable_common:
        description: "Common"
        default: true
        type: boolean
      enable_standard:
        description: "Standard"
        default: true
        type: boolean
      enable_extended:
        description: "Extended"
        default: false
        type: boolean
      enable_virttools:
        description: "Virtualization Tools"
        default: true
        type: boolean
      enable_devtools:
        description: "Developer Tools"
        default: true
        type: boolean
      enable_experimental:
        description: "Experimental"
        default: false
        type: boolean

env:
  IMAGE_DESC: "HorizonOS Dev - Customized Fedora Kinoite Image"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  IMAGE_TAG: "dev"
  FEDORA_VERSION: "43"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push dev image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get version
        id: version
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "version=dev.$(date -u +%Y%m%d).${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build Image
        run: |
          sudo buildah build \
            --file ./Containerfile \
            --tag localhost/build \
            --build-arg FEDORA_VERSION=${{ env.FEDORA_VERSION }} \
            --build-arg BUILD_NUMBER=${{ github.run_number }} \
            --build-arg IMAGE_VERSION=${{ steps.version.outputs.version }} \
            --build-arg ENABLE_COMMON=${{ inputs.enable_common }} \
            --build-arg ENABLE_STANDARD=${{ inputs.enable_standard }} \
            --build-arg ENABLE_EXTENDED=${{ inputs.enable_extended }} \
            --build-arg ENABLE_VIRTTOOLS=${{ inputs.enable_virttools }} \
            --build-arg ENABLE_DEVTOOLS=${{ inputs.enable_devtools }} \
            --build-arg ENABLE_EXPERIMENTAL=${{ inputs.enable_experimental }} \
            --build-arg DISABLE_REPOS=true \
            --label "org.opencontainers.image.created=${{ steps.version.outputs.date }}" \
            --label "org.opencontainers.image.description=${{ env.IMAGE_DESC }}" \
            --label "org.opencontainers.image.version=${{ steps.version.outputs.version }}" \
            --label "org.opencontainers.image.title=${{ env.IMAGE_NAME }}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "containers.bootc=1" \
            .

      - name: Log image size
        run: |
          sudo buildah images --format "table {{.Name}} {{.Size}}" localhost/build

      - name: Rechunk Image
        run: |
          # Export built image to OCI layout
          mkdir -p /tmp/rechunk
          sudo skopeo copy containers-storage:localhost/build oci:/tmp/rechunk/input

          # Rechunk using rpm-ostree to optimize update sizes
          # https://developers.redhat.com/articles/2025/11/03/reduce-bootc-system-update-size
          sudo podman run --rm --privileged \
            -v /tmp/rechunk:/rechunk \
            quay.io/fedora/fedora:${{ env.FEDORA_VERSION }} \
            bash -c "
              dnf install -y rpm-ostree && \
              rpm-ostree compose build-chunked-oci \
                --bootc --format-version=2 \
                --from=oci:/rechunk/input \
                --output=oci:/rechunk/output
            "

      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo skopeo login ghcr.io -u ${{ github.actor }} --password-stdin
          sudo skopeo copy \
            oci:/tmp/rechunk/output \
            docker://${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
