---
name: Build container image (experimental)
on:
  workflow_dispatch:
    inputs:
      fedora_version:
        description: "Fedora base image"
        required: false
        default: "43"
        type: choice
        options:
          - "42"
          - "43"
          - "44"
      enable_common:
        description: "Common"
        required: false
        default: true
        type: boolean
      enable_standard:
        description: "Standard"
        required: false
        default: true
        type: boolean
      enable_extended:
        description: "Extended"
        required: false
        default: false
        type: boolean
      enable_virttools:
        description: "Virtualization Tools"
        required: false
        default: true
        type: boolean
      enable_devtools:
        description: "Developer Tools"
        required: false
        default: true
        type: boolean
      disable_repos:
        description: "Disable Repos"
        required: false
        default: true
        type: boolean

env:
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "exp"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get current date and version
        id: date
        run: |
          BUILD_DATE=$(date -u +%Y%m%d)
          BUILD_NUMBER=${{ github.run_number }}
          VERSION="${BUILD_DATE}.${BUILD_NUMBER}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build Image
        id: build_image
        run: |
          sudo buildah build \
            --file ./Containerfile \
            --tag raw-img \
            --build-arg FEDORA_VERSION=${{ github.event.inputs.fedora_version || '43' }} \
            --build-arg BUILD_NUMBER=${{ github.run_number }} \
            --build-arg IMAGE_VERSION=${{ steps.date.outputs.version }} \
            --build-arg ENABLE_COMMON=${{ github.event.inputs.enable_common || true }} \
            --build-arg ENABLE_STANDARD=${{ github.event.inputs.enable_standard || true }} \
            --build-arg ENABLE_EXTENDED=${{ github.event.inputs.enable_extended || false }} \
            --build-arg ENABLE_VIRTTOOLS=${{ github.event.inputs.enable_virttools || true }} \
            --build-arg ENABLE_DEVTOOLS=${{ github.event.inputs.enable_devtools || true }} \
            --build-arg ENABLE_EXPERIMENTAL=true \
            --build-arg DISABLE_REPOS=${{ github.event.inputs.disable_repos || true }} \
            .

      - name: Log image size
        run: |
          IMAGE_SIZE=$(sudo buildah images --format "{{.Size}}" raw-img | head -n 1)
          echo "Image size: $IMAGE_SIZE"

      - name: Tag image
        run: |
          sudo buildah tag raw-img ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          sudo buildah tag raw-img ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.version }}-exp

      - name: Push To GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
          sudo skopeo copy \
            containers-storage:${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} \
            docker://${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          sudo skopeo copy \
            containers-storage:${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.version }}-exp \
            docker://${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.version }}-exp

      - name: Delete old exp images from GHCR
        run: |
          PACKAGE_NAME="${{ env.IMAGE_NAME }}"
          CUTOFF_DATE=$(date -u -d '8 days ago' +%s)

          PAGE=1
          while true; do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/packages/container/${PACKAGE_NAME}/versions?per_page=100&page=${PAGE}")

            COUNT=$(echo "$RESPONSE" | jq 'length')
            if [ "$COUNT" = "0" ] || [ -z "$COUNT" ]; then
              break
            fi

            echo "$RESPONSE" | jq -c '.[]' | while read -r VERSION; do
              VERSION_ID=$(echo "$VERSION" | jq -r '.id')
              TAGS=$(echo "$VERSION" | jq -r '.metadata.container.tags // [] | join(",")')
              UPDATED_AT=$(echo "$VERSION" | jq -r '.updated_at')
              VERSION_TS=$(date -u -d "$UPDATED_AT" +%s 2>/dev/null || echo 0)

              # Skip the permanent exp tag, only clean up versioned exp tags
              if echo "$TAGS" | grep -qE "^exp$"; then
                continue
              fi

              # Only touch tags ending in -exp
              if ! echo "$TAGS" | grep -q "\-exp"; then
                continue
              fi

              if [ "$VERSION_TS" -lt "$CUTOFF_DATE" ] 2>/dev/null; then
                echo "Deleting version ID: ${VERSION_ID} (tags: ${TAGS}, updated: ${UPDATED_AT})"
                curl -s -X DELETE \
                  -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/user/packages/container/${PACKAGE_NAME}/versions/${VERSION_ID}"
              fi
            done

            if [ "$COUNT" -lt 100 ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done

          echo "GHCR cleanup complete."
